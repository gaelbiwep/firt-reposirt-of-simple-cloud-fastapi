<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Personnes - Testeur</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            width: 100%;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        button.secondary {
            background: #6c757d;
            margin-top: 5px;
        }
        
        button.secondary:hover {
            background: #5a6268;
        }
        
        .result {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
            border-left: 3px solid #667eea;
            font-family: monospace;
            font-size: 12px;
            color: #333;
        }
        
        .success {
            background: #d4edda;
            border-left-color: #28a745;
            color: #155724;
        }
        
        .error {
            background: #f8d7da;
            border-left-color: #dc3545;
            color: #721c24;
        }
        
        .personnes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .personne-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .personne-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .personne-info {
            font-size: 13px;
            margin-bottom: 8px;
            color: #555;
        }
        
        .personne-info strong {
            color: #333;
        }
        
        .color-box {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 3px;
            border: 1px solid #ddd;
            margin-left: 5px;
            vertical-align: middle;
        }
        
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Testeur API Personnes</h1>
        
        <div class="main-grid">
            <!-- Créer une personne -->
            <div class="card">
                <h2>➕ Créer une personne</h2>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="nom" placeholder="ex: Dupont">
                </div>
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="prenom" placeholder="ex: Marie">
                </div>
                <div class="form-group">
                    <label>Genre</label>
                    <select id="genre">
                        <option value="">-- Sélectionne --</option>
                        <option value="fille">Fille</option>
                        <option value="garçon">Garçon</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Âge</label>
                    <input type="number" id="age" placeholder="ex: 25">
                </div>
                <div class="form-group">
                    <label>Couleur préférée</label>
                    <input type="text" id="couleur" placeholder="ex: rose">
                </div>
                <div class="form-group">
                    <label>Ville</label>
                    <input type="text" id="ville" placeholder="ex: Paris">
                </div>
                <div class="form-group">
                    <label>Code postal</label>
                    <input type="text" id="codepostal" placeholder="ex: 75001">
                </div>
                <button onclick="creerPersonne()">Créer</button>
                <div id="createResult" class="result" style="display:none;"></div>
            </div>
            
            <!-- Récupérer une personne -->
            <div class="card">
                <h2>🔍 Récupérer une personne</h2>
                <div class="form-group">
                    <label>ID de la personne</label>
                    <input type="number" id="personneId" placeholder="ex: 1">
                </div>
                <button onclick="obtenirPersonne()">Récupérer</button>
                <div id="getResult" class="result" style="display:none;"></div>
            </div>
            
            <!-- Lister les personnes -->
            <div class="card">
                <h2>📋 Lister les personnes</h2>
                <div class="form-group">
                    <label>Filtrer par genre (optionnel)</label>
                    <select id="filtreGenre">
                        <option value="">-- Tous --</option>
                        <option value="fille">Fille</option>
                        <option value="garçon">Garçon</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Filtrer par ville (optionnel)</label>
                    <input type="text" id="filtreVille" placeholder="ex: Paris">
                </div>
                <button onclick="obtenirPersonnes()">Lister</button>
                <div id="listResult" style="display:none;">
                    <div id="personnesList" class="personnes-list"></div>
                </div>
            </div>
            
            <!-- Ajouter un ami -->
            <div class="card">
                <h2>👥 Ajouter un ami</h2>
                <div class="form-group">
                    <label>ID de la personne</label>
                    <input type="number" id="personneIdAmi" placeholder="ex: 1">
                </div>
                <div class="form-group">
                    <label>ID de l'ami</label>
                    <input type="number" id="amiId" placeholder="ex: 2">
                </div>
                <button onclick="ajouterAmi()">Ajouter l'ami</button>
                <div id="amiResult" class="result" style="display:none;"></div>
            </div>
            
            <!-- Récupérer les amis -->
            <div class="card">
                <h2>👫 Voir les amis</h2>
                <div class="form-group">
                    <label>ID de la personne</label>
                    <input type="number" id="personneIdAmis" placeholder="ex: 1">
                </div>
                <button onclick="obtenirAmis()">Afficher les amis</button>
                <div id="amisResult" style="display:none;">
                    <div id="amisList" class="personnes-list"></div>
                </div>
            </div>
            
            <!-- Statistiques -->
            <div class="card">
                <h2>📊 Statistiques</h2>
                <button onclick="obtenirStats()">Charger les stats</button>
                <div id="statsResult" class="result" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        function showResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.className = `result ${isError ? 'error' : 'success'}`;
            element.textContent = JSON.stringify(data, null, 2);
            element.style.display = 'block';
        }

        async function creerPersonne() {
            const data = {
                nom: document.getElementById('nom').value,
                prenom: document.getElementById('prenom').value,
                genre: document.getElementById('genre').value,
                age: parseInt(document.getElementById('age').value),
                couleur_preferee: document.getElementById('couleur').value,
                ville: document.getElementById('ville').value,
                code_postal: document.getElementById('codepostal').value,
            };

            try {
                const response = await fetch(`${API_URL}/personnes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                showResult('createResult', result, !response.ok);
            } catch (error) {
                showResult('createResult', { erreur: error.message }, true);
            }
        }

        async function obtenirPersonne() {
            const id = document.getElementById('personneId').value;
            try {
                const response = await fetch(`${API_URL}/personnes/${id}`);
                const result = await response.json();
                showResult('getResult', result, !response.ok);
            } catch (error) {
                showResult('getResult', { erreur: error.message }, true);
            }
        }

        async function obtenirPersonnes() {
            const genre = document.getElementById('filtreGenre').value;
            const ville = document.getElementById('filtreVille').value;
            let url = `${API_URL}/personnes`;
            const params = new URLSearchParams();
            if (genre) params.append('genre', genre);
            if (ville) params.append('ville', ville);
            if (params.toString()) url += '?' + params.toString();

            try {
                const response = await fetch(url);
                const result = await response.json();
                
                const listElement = document.getElementById('personnesList');
                listElement.innerHTML = result.map(p => `
                    <div class="personne-card">
                        <h3>${p.prenom} ${p.nom}</h3>
                        <div class="personne-info"><strong>Genre:</strong> ${p.genre}</div>
                        <div class="personne-info"><strong>Âge:</strong> ${p.age} ans</div>
                        <div class="personne-info"><strong>Couleur:</strong> ${p.couleur_preferee}
                            <div class="color-box" style="background-color: ${p.couleur_preferee};"></div>
                        </div>
                        <div class="personne-info"><strong>Ville:</strong> ${p.ville} ${p.code_postal || ''}</div>
                        <div class="personne-info"><strong>ID:</strong> ${p.id}</div>
                        <div class="personne-info"><strong>Amis:</strong> ${p.amis_ids?.length || 0}</div>
                    </div>
                `).join('');
                
                document.getElementById('listResult').style.display = 'block';
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        async function ajouterAmi() {
            const personneId = document.getElementById('personneIdAmi').value;
            const amiId = document.getElementById('amiId').value;

            try {
                const response = await fetch(`${API_URL}/personnes/${personneId}/ajouter-ami/${amiId}`, {
                    method: 'POST'
                });
                const result = await response.json();
                showResult('amiResult', result, !response.ok);
            } catch (error) {
                showResult('amiResult', { erreur: error.message }, true);
            }
        }

        async function obtenirAmis() {
            const personneId = document.getElementById('personneIdAmis').value;

            try {
                const response = await fetch(`${API_URL}/personnes/${personneId}/amis`);
                const result = await response.json();
                
                const amisElement = document.getElementById('amisList');
                if (result.length === 0) {
                    amisElement.innerHTML = '<p>Aucun ami</p>';
                } else {
                    amisElement.innerHTML = result.map(p => `
                        <div class="personne-card">
                            <h3>${p.prenom} ${p.nom}</h3>
                            <div class="personne-info"><strong>Genre:</strong> ${p.genre}</div>
                            <div class="personne-info"><strong>Âge:</strong> ${p.age} ans</div>
                            <div class="personne-info"><strong>Couleur:</strong> ${p.couleur_preferee}</div>
                            <div class="personne-info"><strong>ID:</strong> ${p.id}</div>
                        </div>
                    `).join('');
                }
                
                document.getElementById('amisResult').style.display = 'block';
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        async function obtenirStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const result = await response.json();
                showResult('statsResult', result, !response.ok);
            } catch (error) {
                showResult('statsResult', { erreur: error.message }, true);
            }
        }
    </script>
</body>
</html>
